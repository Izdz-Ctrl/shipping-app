name: BankSystem CI Automation

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ] # Kích hoạt khi có PR vào nhánh main

jobs:
  build-and-test:
    # Cần cấp quyền này để Bot có thể viết bình luận vào Pull Request
    permissions:
      contents: read
      pull-requests: write

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Verify with JaCoCo
        run: mvn clean verify

      - name: Checkstyle Review
        # Con Bot này sẽ tự động soi lỗi và bình luận vào PR
        uses: dbelyaev/action-checkstyle@master
        with:
          github_token: ${{ secrets.github_token }}
          level: warning